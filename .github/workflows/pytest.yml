name: Tests

on:
  push:
    branches: [main, dev, feature/*]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

# Prevent duplicate concurrent runs for the same ref (push + PR for the
# same commit, or rapid pushes to the same branch).  Without this the
# multi-arch docker-publish jobs race on GHA cache writes and one can
# stall to the 6-hour runner timeout.
concurrency:
  # Use the bare branch name in both push and pull_request events
  # (`github.ref` is `refs/heads/X` for push but `refs/pull/N/merge` for
  # PR; `github.head_ref` is set on PR only; `github.ref_name` is the
  # bare branch on push).  Combining them collapses both events for the
  # same branch into a single concurrency group, preventing the GHA
  # build cache races that caused PR #10's 6-hour timeout.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.0
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install -e sdks/qobuz_api_client/clients/python
        poetry run pip install -e sdks/qobuz_api_client/clients/python/tidal

    - name: Run unit tests
      run: poetry run pytest tests/ -q --tb=short --ignore=tests/test_e2e_download.py -k "not test_streamrip_versions_match"

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: backend-tests
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.0
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: |
        poetry install
        poetry run pip install -e sdks/qobuz_api_client/clients/python
        poetry run pip install -e sdks/qobuz_api_client/clients/python/tidal

    - name: Run e2e tests
      if: env.QOBUZ_TOKEN != ''
      env:
        QOBUZ_TOKEN: ${{ secrets.QOBUZ_TOKEN }}
        QOBUZ_USER_ID: ${{ secrets.QOBUZ_USER_ID }}
      run: poetry run pytest tests/test_e2e_download.py -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Build frontend
      run: cd frontend && npm run build

  docker-publish:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # Push only for same-repo events. PRs from forks get a build-only
    # verification because their GITHUB_TOKEN has read-only package scope.
    - name: Decide whether to push
      id: push
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" && \
              "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
          echo "push=false" >> $GITHUB_OUTPUT
        else
          echo "push=true" >> $GITHUB_OUTPUT
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: steps.push.outputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr,prefix=pr-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=sha-,format=short
        flavor: |
          latest=${{ startsWith(github.ref, 'refs/tags/v') }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ steps.push.outputs.push == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
