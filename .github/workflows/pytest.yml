name: Tests

on:
  push:
    branches: [main, dev, feature/*]
  pull_request:
    branches: [main, dev]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.0
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Cache Poetry virtualenv
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

    - name: Install dependencies
      run: |
        poetry install
        poetry run pip install -e sdks/qobuz_api_client/clients/python
        poetry run pip install -e sdks/qobuz_api_client/clients/python/tidal

    - name: Run unit tests
      run: poetry run pytest tests/ -q --tb=short --ignore=tests/test_e2e_download.py -k "not test_streamrip_versions_match"

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: backend-tests
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.0
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: |
        poetry install
        poetry run pip install -e sdks/qobuz_api_client/clients/python
        poetry run pip install -e sdks/qobuz_api_client/clients/python/tidal

    - name: Run e2e tests
      if: env.QOBUZ_TOKEN != ''
      env:
        QOBUZ_TOKEN: ${{ secrets.QOBUZ_TOKEN }}
        QOBUZ_USER_ID: ${{ secrets.QOBUZ_USER_ID }}
      run: poetry run pytest tests/test_e2e_download.py -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Build frontend
      run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Docker image
      run: docker build -f docker/Dockerfile -t streamrip:test .
